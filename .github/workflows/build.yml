name: Build site from Jinja templates

on:
  push:
    paths:
      - 'templates/**'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build HTML
        run: python build.py

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html music.html resources.html enquiries.html
          git diff --cached --quiet || git commit -m "Rebuild HTML from Jinja templates [skip ci]"
          git push
